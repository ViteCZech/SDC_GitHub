name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Nastavení Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalace a sestavení
        run: |
          npm install
          npm run build
        working-directory: simple-dart-counter

      - name: Nahrání náhledu na Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIMPLE_DART_COUNTER_12FF2 }}
          projectId: simple-dart-counter-12ff2
          entryPoint: simple-dart-counter