name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Stažení kódu z GitHubu
        uses: actions/checkout@v4
      
      - name: Nastavení Node.js (verze 20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Instalace závislostí
        # Používáme 'install' místo 'ci' pro maximální kompatibilitu
        run: npm install
        working-directory: simple-dart-counter

      - name: Sestavení aplikace (Build)
        # Tento krok vytvoří složku 'dist'
        run: npm run build
        working-directory: simple-dart-counter

      - name: Nahrání na Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIMPLE_DART_COUNTER_12FF2 }}
          channelId: live
          entryPoint: simple-dart-counter