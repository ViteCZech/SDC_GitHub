name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Nastavení Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Instalace knihoven
        # Používáme klasický install, protože je nejstabilnější pro začátek
        run: npm install
        working-directory: simple-dart-counter

      - name: Sestavení aplikace (Build)
        # Tady to doteď padalo - přidali jsme podrobnější výpis
        run: npm run build
        working-directory: simple-dart-counter

      - name: Nahrání na Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIMPLE_DART_COUNTER_12FF2 }}
          channelId: live
          entryPoint: simple-dart-counter